<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Rock Paper Scissors</h1>

      <div class="choices">
        <div class="choice-item">
          <img src="./images/rock.jpg" alt="Rock" />
          <button id="rock">
            Rock
          </button>
        </div>
        <div class="choice-item">
          <img src="./images/paper.jpg" alt="Paper" />
          <button id="paper">
            Paper
          </button>
        </div>
        <div class="choice-item">
          <img src="./images/scissor.jpg" alt="Scissors" />
          <button id="scissors">
            Scissors
          </button>
        </div>
      </div>

      <div class="result">
        <p id="user-choice">Your choice:</p>
        <p id="computer-choice">Computer choice:</p>
        <p id="winner">Winner:</p>
      </div>
    </div>

    <script src="script.js"></script>
    <!-- compiled JS from TypeScript -->
  </body>
</html>
